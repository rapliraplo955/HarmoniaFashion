<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | HarmoniFashion</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --gold: #C9A84C;
      --gold-light: #E8C96A;
      --black: #0D0D0D;
      --charcoal: #1A1A1A;
      --mid: #4A4A4A;
      --light-gray: #F0EDE8;
      --off-white: #FAF8F5;
      --white: #FFFFFF;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Jost', sans-serif; background: linear-gradient(135deg, var(--black) 0%, var(--charcoal) 100%); color: var(--black); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }

    .container { max-width: 400px; width: 100%; }

    .auth-card { background: var(--white); padding: 40px 32px; border-radius: 8px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }

    .auth-logo { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 300; letter-spacing: 0.18em; color: var(--gold); text-align: center; margin-bottom: 8px; }
    .auth-logo span { font-style: italic; color: var(--black); }

    .auth-subtitle { text-align: center; font-size: 12px; color: var(--mid); letter-spacing: 0.05em; margin-bottom: 32px; }

    .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 20px; }
    .form-group label { font-size: 11px; font-weight: 500; letter-spacing: 0.05em; color: var(--mid); text-transform: uppercase; }
    .form-group input { padding: 12px 14px; border: 1px solid #ddd; font-family: 'Jost', sans-serif; font-size: 13px; outline: none; transition: border-color 0.2s; }
    .form-group input:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(201,168,76,0.1); }

    .btn-submit { background: var(--gold); color: var(--black); border: none; padding: 12px 16px; font-size: 12px; letter-spacing: 0.15em; font-weight: 500; cursor: pointer; font-family: 'Jost', sans-serif; text-transform: uppercase; width: 100%; transition: background 0.2s; }
    .btn-submit:hover { background: var(--gold-light); }
    .btn-submit:disabled { background: #ccc; cursor: not-allowed; }

    .auth-divider { display: flex; align-items: center; gap: 12px; margin: 24px 0; }
    .auth-divider-line { flex: 1; height: 1px; background: #ddd; }
    .auth-divider-text { font-size: 11px; color: var(--mid); }

    .btn-signup { background: none; border: 1px solid var(--gold); color: var(--gold); padding: 12px 16px; font-size: 12px; letter-spacing: 0.15em; cursor: pointer; font-family: 'Jost', sans-serif; text-transform: uppercase; width: 100%; transition: all 0.2s; }
    .btn-signup:hover { background: var(--gold-pale); }

    .auth-links { text-align: center; margin-top: 16px; }
    .auth-links a { font-size: 11px; color: var(--gold); text-decoration: none; transition: color 0.2s; }
    .auth-links a:hover { color: var(--gold-light); }
    .auth-links a + a { margin-left: 16px; }

    .toast { position: fixed; bottom: 20px; left: 20px; background: var(--charcoal); color: var(--gold); padding: 14px 18px; font-size: 12px; border-left: 3px solid var(--gold); z-index: 9999; animation: slideIn 0.3s; max-width: 320px; }
    .toast.error { border-left-color: #e53935; color: #e53935; }

    @keyframes slideIn { from { transform: translateX(-100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

    .loading { display: none; text-align: center; color: var(--gold); font-size: 13px; margin-top: 16px; }
    .loading.show { display: block; }

    .back-link { text-align: center; margin-bottom: 24px; }
    .back-link a { font-size: 12px; color: var(--gold); text-decoration: none; display: inline-flex; align-items: center; gap: 6px; transition: color 0.2s; }
    .back-link a:hover { color: var(--gold-light); }
  </style>
</head>
<body>

<div class="container">
  <div class="back-link">
    <a href="/">← Kembali ke Katalog</a>
  </div>

  <div class="auth-card">
    <div class="auth-logo">Harmoni<span>Fashion</span></div>
    <div class="auth-subtitle">Koleksi Fashion Luxury Brand</div>

    <!-- LOGIN FORM -->
    <form id="loginForm" onsubmit="return handleLogin(event)" style="display: none;">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="loginEmail" placeholder="your@email.com" required />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="loginPassword" placeholder="••••••••" required />
      </div>
      <button type="submit" class="btn-submit">LOGIN</button>
      <div class="loading" id="loginLoading">Proses login...</div>
    </form>

    <!-- SIGNUP FORM -->
    <form id="signupForm" onsubmit="return handleSignup(event)">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="signupEmail" placeholder="your@email.com" required />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="signupPassword" placeholder="Minimal 6 karakter" required />
      </div>
      <div class="form-group">
        <label>Konfirmasi Password</label>
        <input type="password" id="signupPasswordConfirm" placeholder="Ulangi password" required />
      </div>
      <button type="submit" class="btn-submit">BUAT AKUN</button>
      <div class="loading" id="signupLoading">Membuat akun...</div>
    </form>

    <div class="auth-divider">
      <div class="auth-divider-line"></div>
      <div class="auth-divider-text">ATAU</div>
      <div class="auth-divider-line"></div>
    </div>

    <button type="button" class="btn-signup" id="toggleBtn" onclick="toggleForm()">DAFTAR AKUN BARU</button>

    <div class="auth-links">
      <a href="#" onclick="handleForgotPassword(event)">Lupa Password?</a>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'YOUR_SUPABASE_URL';
const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let isLoginMode = true;

function toggleForm() {
  isLoginMode = !isLoginMode;
  
  if (isLoginMode) {
    document.getElementById('loginForm').style.display = 'block';
    document.getElementById('signupForm').style.display = 'none';
    document.getElementById('toggleBtn').textContent = 'DAFTAR AKUN BARU';
  } else {
    document.getElementById('loginForm').style.display = 'none';
    document.getElementById('signupForm').style.display = 'block';
    document.getElementById('toggleBtn').textContent = 'SUDAH PUNYA AKUN?';
  }
}

async function handleLogin(event) {
  event.preventDefault();
  
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  
  if (!email || !password) {
    showToast('Email dan password tidak boleh kosong.', true);
    return false;
  }
  
  document.getElementById('loginLoading').classList.add('show');
  
  try {
    const { data, error } = await sb.auth.signInWithPassword({ email, password });
    
    if (error) {
      showToast('Login gagal: ' + error.message, true);
      document.getElementById('loginLoading').classList.remove('show');
      return false;
    }
    
    showToast('Login berhasil! Mengalihkan...');
    setTimeout(() => {
      window.location.href = '/';
    }, 1500);
  } catch (err) {
    showToast('Terjadi kesalahan: ' + err.message, true);
    document.getElementById('loginLoading').classList.remove('show');
  }
  
  return false;
}

async function handleSignup(event) {
  event.preventDefault();
  
  const email = document.getElementById('signupEmail').value.trim();
  const password = document.getElementById('signupPassword').value;
  const passwordConfirm = document.getElementById('signupPasswordConfirm').value;
  
  if (!email || !password || !passwordConfirm) {
    showToast('Semua field harus diisi.', true);
    return false;
  }
  
  if (password.length < 6) {
    showToast('Password minimal 6 karakter.', true);
    return false;
  }
  
  if (password !== passwordConfirm) {
    showToast('Password tidak cocok.', true);
    return false;
  }
  
  document.getElementById('signupLoading').classList.add('show');
  
  try {
    const { data, error } = await sb.auth.signUp({
      email,
      password,
      options: {
        emailRedirectTo: `${window.location.origin}/auth/callback`
      }
    });
    
    if (error) {
      showToast('Signup gagal: ' + error.message, true);
      document.getElementById('signupLoading').classList.remove('show');
      return false;
    }
    
    showToast('Akun berhasil dibuat! Silakan cek email untuk verifikasi.');
    
    // Reset form
    document.getElementById('signupForm').reset();
    setTimeout(() => {
      toggleForm();
    }, 2000);
  } catch (err) {
    showToast('Terjadi kesalahan: ' + err.message, true);
    document.getElementById('signupLoading').classList.remove('show');
  }
  
  return false;
}

async function handleForgotPassword(event) {
  event.preventDefault();
  
  const email = prompt('Masukkan email Anda:');
  if (!email) return;
  
  try {
    const { error } = await sb.auth.resetPasswordForEmail(email, {
      redirectTo: `${window.location.origin}/reset-password`
    });
    
    if (error) {
      showToast('Error: ' + error.message, true);
      return;
    }
    
    showToast('Email reset password sudah dikirim. Cek inbox Anda!');
  } catch (err) {
    showToast('Terjadi kesalahan: ' + err.message, true);
  }
}

function showToast(message, isError = false) {
  const toast = document.createElement('div');
  toast.className = 'toast' + (isError ? ' error' : '');
  toast.textContent = message;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 3000);
}

// Check if user already logged in
async function checkAuth() {
  const { data: { user } } = await sb.auth.getUser();
  if (user) {
    window.location.href = '/';
  }
}

checkAuth();
</script>
</body>
</html>
