<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HarmoniFashion | Katalog Fashion Luxury Brand</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --gold: #C9A84C;
      --gold-light: #E8C96A;
      --gold-pale: #F5E9C8;
      --black: #0D0D0D;
      --charcoal: #1A1A1A;
      --dark: #242424;
      --mid: #4A4A4A;
      --light-gray: #F0EDE8;
      --off-white: #FAF8F5;
      --white: #FFFFFF;
      --sidebar-width: 280px;
      --ig: #E1306C;
      --fb: #1877F2;
      --wa: #25D366;
      --tt: #000000;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Jost', sans-serif; background: var(--off-white); color: var(--black); font-weight: 300; }

    /* ── NAVBAR ── */
    nav {
      position: sticky; top: 0; z-index: 100;
      background: var(--black);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 48px; height: 64px;
      border-bottom: 1px solid #2a2a2a;
    }
    .nav-logo { font-family: 'Cormorant Garamond', serif; font-size: 23px; font-weight: 300; letter-spacing: 0.18em; color: var(--gold); text-decoration: none; }
    .nav-logo span { font-style: italic; color: var(--white); }
    .nav-right { display: flex; align-items: center; gap: 16px; }
    .theme-btns { display: flex; gap: 8px; }
    .theme-btn { background: none; border: 1px solid #3a3a3a; color: #aaa; padding: 4px 12px; font-size: 11px; letter-spacing: 0.1em; cursor: pointer; font-family: 'Jost', sans-serif; transition: all 0.2s; border-radius: 2px; }
    .theme-btn:hover, .theme-btn.active { border-color: var(--gold); color: var(--gold); }
    .btn-login { background: var(--gold); color: var(--black); border: none; padding: 8px 22px; font-size: 12px; letter-spacing: 0.15em; font-weight: 500; cursor: pointer; font-family: 'Jost', sans-serif; text-transform: uppercase; text-decoration: none; transition: background 0.2s; }
    .btn-login:hover { background: var(--gold-light); }
    .btn-logout { background: #e53935; color: #fff; border: none; padding: 8px 22px; font-size: 12px; letter-spacing: 0.15em; font-weight: 500; cursor: pointer; font-family: 'Jost', sans-serif; text-transform: uppercase; transition: background 0.2s; }
    .btn-logout:hover { background: #c62828; }
    .filter-toggle { display: none; background: none; border: 1px solid #3a3a3a; color: #ccc; padding: 6px 14px; font-size: 12px; cursor: pointer; font-family: 'Jost', sans-serif; letter-spacing: 0.1em; align-items: center; gap: 6px; }

    /* ── SEARCH BAR ── */
    .nav-search-wrap { position: relative; display: flex; align-items: center; }
    .nav-search-input { background: #1a1a1a; border: 1px solid #3a3a3a; color: #ccc; padding: 7px 36px 7px 14px; font-size: 12px; letter-spacing: 0.04em; font-family: 'Jost', sans-serif; width: 220px; outline: none; transition: border-color 0.2s, width 0.3s; }
    .nav-search-input:focus { border-color: var(--gold); width: 280px; }
    .nav-search-input::placeholder { color: #555; }
    .nav-search-btn { position: absolute; right: 0; top: 0; bottom: 0; width: 34px; background: none; border: none; color: #666; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: color 0.2s; }
    .nav-search-btn:hover { color: var(--gold); }
    .nav-search-btn svg { width: 14px; height: 14px; fill: currentColor; }

    /* ── SEARCH DROPDOWN ── */
    .search-dropdown { position: absolute; top: calc(100% + 6px); left: 0; right: 0; background: var(--charcoal); border: 1px solid #3a3a3a; z-index: 300; max-height: 380px; overflow-y: auto; box-shadow: 0 8px 32px rgba(0,0,0,0.4); display: none; }
    .search-dropdown.open { display: block; }
    .search-result-item { display: flex; align-items: center; gap: 12px; padding: 10px 14px; cursor: pointer; border-bottom: 1px solid #2a2a2a; transition: background 0.15s; }
    .search-result-item:hover { background: #222; }
    .search-result-item:last-child { border-bottom: none; }
    .search-result-img { width: 36px; height: 48px; object-fit: cover; background: #333; flex-shrink: 0; }
    .search-result-info { flex: 1; min-width: 0; }
    .search-result-brand { font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--gold); }
    .search-result-name { font-size: 12px; color: #ddd; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
    .search-result-price { font-size: 11px; color: #888; margin-top: 2px; }
    .search-no-result { padding: 18px 14px; text-align: center; font-size: 12px; color: #666; letter-spacing: 0.05em; }

    /* ── WISHLIST BTN ON CARD ── */
    .card-wishlist-btn { position: absolute; top: 10px; right: 10px; background: rgba(13,13,13,0.7); border: none; color: #ccc; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 16px; transition: all 0.2s; z-index: 2; border-radius: 50%; }
    .card-wishlist-btn:hover { color: #e53935; background: rgba(229,57,53,0.15); }
    .card-wishlist-btn.wishlisted { color: #e53935; background: rgba(229,57,53,0.15); }
    .card-wishlist-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── WISHLIST ICON IN NAV ── */
    .nav-wishlist-btn { background: none; border: 1px solid #3a3a3a; color: #aaa; padding: 7px 10px; font-size: 13px; cursor: pointer; position: relative; display: flex; align-items: center; gap: 5px; transition: all 0.2s; font-family: 'Jost', sans-serif; letter-spacing: 0.05em; }
    .nav-wishlist-btn:hover { border-color: var(--gold); color: var(--gold); }
    .nav-wishlist-btn:disabled { opacity: 0.5; cursor: not-allowed; border-color: #3a3a3a; color: #666; }
    .wishlist-badge { position: absolute; top: -6px; right: -6px; background: #e53935; color: #fff; width: 16px; height: 16px; border-radius: 50%; font-size: 9px; display: flex; align-items: center; justify-content: center; display: none; font-weight: 600; }
    .wishlist-badge.show { display: flex; }

    /* ── WISHLIST MODAL ── */
    .wishlist-overlay { position: fixed; inset: 0; background: rgba(13,13,13,0.78); display: none; align-items: flex-start; justify-content: flex-end; z-index: 500; }
    .wishlist-overlay.open { display: flex; }
    .wishlist-panel { background: var(--white); width: 380px; max-width: 95vw; height: 100vh; overflow-y: auto; display: flex; flex-direction: column; }
    .wishlist-panel-header { display: flex; align-items: center; justify-content: space-between; padding: 20px 22px; border-bottom: 1px solid #e8e3dc; background: var(--black); }
    .wishlist-panel-title { font-family: 'Cormorant Garamond', serif; font-size: 20px; color: var(--gold); letter-spacing: 0.08em; }
    .wishlist-panel-close { background: none; border: none; color: #aaa; font-size: 18px; cursor: pointer; padding: 4px; }
    .wishlist-panel-close:hover { color: var(--gold); }
    .wishlist-items { flex: 1; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
    .wishlist-item { display: flex; gap: 12px; padding: 12px; border: 1px solid #e8e3dc; position: relative; }
    .wishlist-item-img { width: 60px; height: 80px; object-fit: cover; background: var(--light-gray); flex-shrink: 0; }
    .wishlist-item-info { flex: 1; min-width: 0; }
    .wishlist-item-brand { font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--gold); }
    .wishlist-item-name { font-family: 'Cormorant Garamond', serif; font-size: 15px; line-height: 1.3; margin: 3px 0; }
    .wishlist-item-price { font-size: 12px; color: var(--mid); }
    .wishlist-item-remove { position: absolute; top: 8px; right: 8px; background: none; border: none; color: #ccc; cursor: pointer; font-size: 13px; }
    .wishlist-item-remove:hover { color: #e53935; }
    .wishlist-item-actions { display: flex; gap: 8px; margin-top: 8px; }
    .wishlist-btn-view { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; background: var(--black); color: var(--gold); border: none; padding: 6px 12px; cursor: pointer; font-family: 'Jost', sans-serif; transition: background 0.2s; }
    .wishlist-btn-view:hover { background: var(--charcoal); }
    .wishlist-empty { padding: 48px 20px; text-align: center; color: #bbb; font-size: 13px; letter-spacing: 0.03em; }
    .wishlist-login-prompt { padding: 48px 20px; text-align: center; }
    .wishlist-login-prompt p { color: #999; font-size: 13px; margin-bottom: 16px; line-height: 1.5; }
    .wishlist-login-prompt .btn-login { display: inline-block; }

    /* ── SHARE MODAL ── */
    .share-overlay { position: fixed; inset: 0; background: rgba(13,13,13,0.6); display: none; align-items: center; justify-content: center; z-index: 600; padding: 20px; }
    .share-overlay.open { display: flex; }
    .share-box { background: var(--white); max-width: 360px; width: 100%; padding: 30px 28px; position: relative; }
    .share-title { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 400; color: var(--black); margin-bottom: 6px; }
    .share-subtitle { font-size: 11px; color: var(--mid); letter-spacing: 0.05em; margin-bottom: 22px; }
    .share-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
    .share-btn { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 12px; border: 1px solid #e8e3dc; background: none; cursor: pointer; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; transition: all 0.2s; font-family: 'Jost', sans-serif; }
    .share-btn:hover { border-color: var(--gold); color: var(--gold); background: var(--gold-pale); }
    .share-copy { background: var(--light-gray); border: 1px solid #ddd; padding: 12px; margin-bottom: 12px; border-radius: 3px; word-break: break-all; font-size: 10px; color: #666; }
    .share-copy-btn { background: var(--black); color: var(--gold); border: none; padding: 8px 16px; font-size: 10px; letter-spacing: 0.08em; cursor: pointer; width: 100%; transition: background 0.2s; }
    .share-copy-btn:hover { background: var(--charcoal); }
    .share-close { position: absolute; top: 14px; right: 14px; background: none; border: none; color: #999; font-size: 16px; cursor: pointer; padding: 0; }

    /* ── TOAST ── */
    .toast { position: fixed; bottom: 20px; left: 20px; background: var(--charcoal); color: var(--gold); padding: 14px 18px; font-size: 12px; border-left: 3px solid var(--gold); z-index: 9999; animation: slideInLeft 0.3s ease-out; max-width: 280px; }
    .toast.error { border-left-color: #e53935; color: #e53935; }
    @keyframes slideInLeft { from { transform: translateX(-100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

    /* ── MAIN LAYOUT ── */
    .container { display: flex; max-width: 1800px; margin: 0 auto; }
    .sidebar { width: var(--sidebar-width); padding: 32px 20px; border-right: 1px solid #e8e3dc; background: var(--white); position: sticky; top: 64px; height: calc(100vh - 64px); overflow-y: auto; }
    .main { flex: 1; padding: 32px 48px; }

    /* ── FILTERS ── */
    .filter-section { margin-bottom: 28px; }
    .filter-title { font-family: 'Cormorant Garamond', serif; font-size: 16px; font-weight: 400; margin-bottom: 14px; color: var(--black); }
    .filter-group { display: flex; flex-direction: column; gap: 8px; }
    .filter-checkbox { display: flex; align-items: center; gap: 8px; cursor: pointer; }
    .filter-checkbox input { cursor: pointer; }
    .filter-checkbox label { font-size: 12px; cursor: pointer; letter-spacing: 0.02em; color: #555; }
    .filter-checkbox input:checked + label { color: var(--gold); font-weight: 500; }
    .filter-price { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .filter-price input { flex: 1; padding: 6px; font-size: 11px; border: 1px solid #ddd; }

    /* ── PRODUCT GRID ── */
    .products-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; padding-bottom: 14px; border-bottom: 1px solid #e8e3dc; }
    .products-title { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 300; }
    .products-subtitle { font-size: 11px; color: var(--mid); letter-spacing: 0.1em; text-transform: uppercase; }
    .view-toggle { display: flex; gap: 6px; }
    .view-btn { background: none; border: 1px solid #ddd; color: #888; width: 28px; height: 28px; cursor: pointer; font-size: 13px; transition: all 0.2s; }
    .view-btn.active { border-color: var(--gold); color: var(--gold); background: var(--gold-pale); }
    .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
    .product-card { position: relative; background: var(--white); border: 1px solid #e8e3dc; padding: 12px; transition: all 0.3s; cursor: pointer; }
    .product-card:hover { border-color: var(--gold); box-shadow: 0 8px 24px rgba(201,168,76,0.12); }
    .product-img { width: 100%; aspect-ratio: 2/3; object-fit: cover; background: var(--light-gray); margin-bottom: 12px; }
    .product-brand { font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--gold); margin-bottom: 4px; }
    .product-name { font-family: 'Cormorant Garamond', serif; font-size: 14px; line-height: 1.4; margin-bottom: 8px; min-height: 32px; }
    .product-price { font-size: 13px; font-weight: 500; color: var(--black); margin-bottom: 10px; }
    .product-actions { display: flex; gap: 6px; }
    .btn-primary { flex: 1; background: var(--black); color: var(--gold); border: none; padding: 8px 12px; font-size: 10px; letter-spacing: 0.1em; cursor: pointer; font-family: 'Jost', sans-serif; transition: background 0.2s; text-transform: uppercase; }
    .btn-primary:hover { background: var(--charcoal); }
    .btn-secondary { flex: 1; background: none; border: 1px solid #ddd; color: #555; padding: 8px 12px; font-size: 10px; letter-spacing: 0.1em; cursor: pointer; font-family: 'Jost', sans-serif; transition: all 0.2s; text-transform: uppercase; }
    .btn-secondary:hover { border-color: var(--gold); color: var(--gold); }

    /* ── PRODUCT DETAIL MODAL ── */
    .modal-overlay { position: fixed; inset: 0; background: rgba(13,13,13,0.7); display: none; align-items: center; justify-content: center; z-index: 400; padding: 20px; overflow-y: auto; }
    .modal-overlay.open { display: flex; }
    .modal-content { background: var(--white); max-width: 900px; width: 100%; position: relative; max-height: 90vh; overflow-y: auto; display: grid; grid-template-columns: 1fr 1fr; }
    .modal-img-section { position: sticky; top: 0; background: var(--white); }
    .modal-img { width: 100%; aspect-ratio: 2/3; object-fit: cover; background: var(--light-gray); }
    .modal-detail-section { padding: 40px 32px; display: flex; flex-direction: column; }
    .modal-brand { font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--gold); margin-bottom: 8px; }
    .modal-name { font-family: 'Cormorant Garamond', serif; font-size: 32px; line-height: 1.2; margin-bottom: 12px; }
    .modal-price { font-size: 18px; font-weight: 500; color: var(--black); margin-bottom: 20px; }
    .modal-desc { font-size: 12px; line-height: 1.6; color: var(--mid); margin-bottom: 24px; border-bottom: 1px solid #e8e3dc; padding-bottom: 24px; }
    .modal-specs { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; font-size: 11px; }
    .modal-spec-item { display: flex; flex-direction: column; }
    .modal-spec-label { color: var(--mid); margin-bottom: 4px; letter-spacing: 0.05em; }
    .modal-spec-value { font-weight: 500; }
    .modal-actions { display: flex; gap: 12px; margin-bottom: 24px; }
    .modal-btn { flex: 1; padding: 12px; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; font-family: 'Jost', sans-serif; transition: all 0.2s; border: none; }
    .modal-btn-primary { background: var(--black); color: var(--gold); }
    .modal-btn-primary:hover { background: var(--charcoal); }
    .modal-btn-secondary { background: none; border: 1px solid #ddd; color: #555; }
    .modal-btn-secondary:hover { border-color: var(--gold); color: var(--gold); }
    .modal-btn-wishlist { background: none; border: 1px solid #ddd; color: #555; display: flex; align-items: center; justify-content: center; gap: 6px; }
    .modal-btn-wishlist:hover { border-color: #e53935; color: #e53935; }
    .modal-btn-wishlist.wishlisted { border-color: #e53935; color: #e53935; }
    .modal-close { position: absolute; top: 20px; right: 20px; background: none; border: none; font-size: 24px; color: #888; cursor: pointer; z-index: 10; }
    .modal-close:hover { color: var(--black); }

    /* ── REVIEWS SECTION IN MODAL ── */
    .modal-reviews { grid-column: 1 / -1; padding: 0 32px 40px; border-top: 1px solid #e8e3dc; }
    .modal-reviews-title { font-family: 'Cormorant Garamond', serif; font-size: 18px; margin-bottom: 20px; margin-top: 20px; }
    .reviews-list { display: flex; flex-direction: column; gap: 16px; max-height: 300px; overflow-y: auto; margin-bottom: 16px; }
    .review-item { padding: 12px; border: 1px solid #f0ede8; border-radius: 2px; }
    .review-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .review-author { font-weight: 500; font-size: 12px; }
    .review-rating { font-size: 12px; color: var(--gold); }
    .review-text { font-size: 11px; color: #666; line-height: 1.4; }
    .review-date { font-size: 9px; color: #999; margin-top: 6px; }
    .review-form { margin-top: 20px; display: flex; flex-direction: column; gap: 12px; }
    .form-group { display: flex; flex-direction: column; gap: 4px; }
    .form-group label { font-size: 11px; letter-spacing: 0.05em; color: var(--mid); }
    .form-group input,
    .form-group textarea { padding: 8px; border: 1px solid #ddd; font-family: 'Jost', sans-serif; font-size: 11px; }
    .form-group textarea { resize: vertical; }
    .review-rating-input { display: flex; gap: 4px; }
    .star-btn { background: none; border: none; font-size: 16px; cursor: pointer; color: #ddd; transition: color 0.2s; }
    .star-btn:hover { color: var(--gold); }
    .star-btn.active { color: var(--gold); }
    .btn-submit-review { background: var(--black); color: var(--gold); border: none; padding: 10px; font-size: 10px; letter-spacing: 0.08em; cursor: pointer; font-family: 'Jost', sans-serif; text-transform: uppercase; transition: background 0.2s; }
    .btn-submit-review:hover { background: var(--charcoal); }

    /* ── ADMIN SECTION ── */
    .admin-container { padding: 32px 48px; }
    .admin-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 32px; }
    .admin-page-title { font-family: 'Cormorant Garamond', serif; font-size: 32px; font-weight: 300; margin-bottom: 8px; }
    .admin-page-title em { font-style: italic; color: var(--gold); }
    .admin-page-sub { font-size: 12px; color: var(--mid); letter-spacing: 0.05em; }
    .admin-panel { background: var(--white); border: 1px solid #e8e3dc; padding: 20px; margin-bottom: 28px; }
    .admin-panel-title { font-family: 'Cormorant Garamond', serif; font-size: 18px; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid #e8e3dc; }
    .admin-table-wrap { overflow-x: auto; }
    .admin-table { width: 100%; border-collapse: collapse; font-size: 11px; }
    .admin-table th { background: var(--light-gray); padding: 10px; text-align: left; font-weight: 500; border-bottom: 1px solid #ddd; letter-spacing: 0.05em; }
    .admin-table td { padding: 10px; border-bottom: 1px solid #f0ede8; }
    .admin-table tr:hover { background: #fafaf8; }
    .btn-icon-sm { background: none; border: 1px solid #ddd; padding: 5px 10px; font-size: 9px; cursor: pointer; font-family: 'Jost', sans-serif; text-transform: uppercase; margin-right: 4px; transition: all 0.2s; }
    .btn-icon-sm:hover { border-color: var(--gold); color: var(--gold); }
    .btn-icon-sm.danger { border-color: #e53935; color: #e53935; }
    .btn-icon-sm.danger:hover { background: rgba(229,57,53,0.1); }
    .admin-form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
    .admin-form-grid.full { grid-template-columns: 1fr; }
    .admin-field { display: flex; flex-direction: column; gap: 4px; }
    .admin-field label { font-size: 11px; font-weight: 500; letter-spacing: 0.05em; }
    .admin-field input,
    .admin-field textarea { padding: 8px; border: 1px solid #ddd; font-family: 'Jost', sans-serif; font-size: 11px; }
    .admin-field textarea { resize: vertical; }
    .btn-admin-action { background: var(--black); color: var(--gold); border: none; padding: 10px 16px; font-size: 10px; letter-spacing: 0.08em; cursor: pointer; font-family: 'Jost', sans-serif; text-transform: uppercase; transition: background 0.2s; margin-top: 12px; }
    .btn-admin-action:hover { background: var(--charcoal); }
    .btn-admin-action.gold { background: var(--gold); color: var(--black); }
    .btn-admin-action.gold:hover { background: var(--gold-light); }
    .admin-empty { text-align: center; color: #999; padding: 20px !important; }
    .store-vis-badge { display: inline-block; padding: 3px 8px; font-size: 9px; border-radius: 2px; letter-spacing: 0.05em; }
    .store-vis-badge.visible { background: #e8f5e9; color: #2e7d32; }
    .store-vis-badge.hidden { background: #ffebee; color: #c62828; }

    @media (max-width: 1024px) {
      .sidebar { width: 0; padding: 0; border: none; position: absolute; }
      .filter-toggle { display: flex; }
      .modal-content { grid-template-columns: 1fr; }
      .modal-img-section { position: relative; }
      nav { padding: 0 20px; }
      .main { padding: 24px; }
    }
  </style>
</head>
<body>

<!-- ════════════════════════════════════════════ NAVBAR ════════════════════════════════════════════ -->
<nav id="navbar">
  <a href="/" class="nav-logo">Harmoni<span>Fashion</span></a>
  <div class="nav-search-wrap">

<!-- ════════════════════════════════════════════ SCRIPTS ════════════════════════════════════════════ -->
<script>
// ════════════════════════════════════════════ SUPABASE CONFIG ════════════════════════════════════════════
const SUPABASE_URL = 'https://vzmwqpmnxfzwzmbmepmv.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ6bXdxcG1ueGZ6d3ptYm1lcG12Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyMTE1NjksImV4cCI6MjA5Nzc4NzU2OX0.dfwqqEgK3N0eP6HJRGu12qfVXzqAuFfD-T3thEdfSp8';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ════════════════════════════════════════════ STATE ════════════════════════════════════════════
let currentUser = null;
let PRODUCTS = [];
let STORES = [];
let storeComments = {};
let storeRatings = {};
let currentWishlist = [];
let currentProductId = null;
let adminEditState = { type: null, id: null };
let viewMode = 'grid';

// ════════════════════════════════════════════ AUTH ════════════════════════════════════════════
async function initAuth() {
  const { data: { user } } = await sb.auth.getUser();
  currentUser = user;
  updateAuthUI();
  if (currentUser) {
    await loadWishlist();
  }
}

function updateAuthUI() {
  const authContainer = document.getElementById('authContainer');
  if (currentUser) {
    authContainer.innerHTML = `
      <span style="color: #999; font-size: 12px; margin-right: 12px;">Hello, ${currentUser.email.split('@')[0]}</span>
      <button class="btn-logout" onclick="logout()">LOGOUT</button>
    `;
    document.getElementById('wishlistBtn').disabled = false;
  } else {
    authContainer.innerHTML = `<a href="/login" class="btn-login">LOGIN</a>`;
    document.getElementById('wishlistBtn').disabled = true;
    currentWishlist = [];
    updateWishlistCount();
  }
}

async function logout() {
  await sb.auth.signOut();
  currentUser = null;
  currentWishlist = [];
  updateAuthUI();
  closeWishlist();
  showToast('Anda telah logout. Wishlist dihapus.');
  location.reload();
}

// ════════════════════════════════════════════ WISHLIST - SUPABASE ════════════════════════════════════════════
async function loadWishlist() {
  if (!currentUser) return;
  const { data, error } = await sb
    .from('wishlists')
    .select('product_id')
    .eq('user_id', currentUser.id);
  
  if (error) {
    console.error('Error loading wishlist:', error);
    return;
  }
  
  currentWishlist = data ? data.map(w => w.product_id) : [];
  updateWishlistCount();
  updateAllWishlistButtons();
}

async function toggleProductWishlist() {
  if (!currentUser) {
    showToast('Silakan login untuk menggunakan wishlist.');
    return;
  }
  
  if (!currentProductId) return;
  
  if (currentWishlist.includes(currentProductId)) {
    await removeFromWishlist(currentProductId);
  } else {
    await addToWishlist(currentProductId);
  }
}

async function addToWishlist(productId) {
  if (!currentUser) {
    showToast('Silakan login untuk menggunakan wishlist.');
    return;
  }
  
  const { error } = await sb
    .from('wishlists')
    .insert({ user_id: currentUser.id, product_id: productId });
  
  if (error) {
    console.error('Error adding to wishlist:', error);
    showToast('Gagal menambah ke wishlist.', true);
    return;
  }
  
  currentWishlist.push(productId);
  updateWishlistCount();
  updateAllWishlistButtons();
  showToast('Ditambahkan ke wishlist!');
}

async function removeFromWishlist(productId) {
  if (!currentUser) return;
  
  const { error } = await sb
    .from('wishlists')
    .delete()
    .eq('user_id', currentUser.id)
    .eq('product_id', productId);
  
  if (error) {
    console.error('Error removing from wishlist:', error);
    showToast('Gagal menghapus dari wishlist.', true);
    return;
  }
  
  currentWishlist = currentWishlist.filter(id => id !== productId);
  updateWishlistCount();
  updateAllWishlistButtons();
  showToast('Dihapus dari wishlist.');
}

function updateWishlistCount() {
  document.getElementById('wishlistCount').textContent = currentWishlist.length;
  const badge = document.getElementById('wishlistBadge');
  if (currentWishlist.length > 0) {
    badge.textContent = currentWishlist.length;
    badge.classList.add('show');
  } else {
    badge.classList.remove('show');
  }
}

function updateAllWishlistButtons() {
  document.querySelectorAll('.card-wishlist-btn').forEach(btn => {
    const productId = btn.dataset.productId;
    if (currentWishlist.includes(productId)) {
      btn.classList.add('wishlisted');
    } else {
      btn.classList.remove('wishlisted');
    }
  });
  
  const modalBtn = document.getElementById('modalWishlistBtn');
  if (currentProductId && currentWishlist.includes(currentProductId)) {
    modalBtn.classList.add('wishlisted');
  } else if (modalBtn) {
    modalBtn.classList.remove('wishlisted');
  }
}

function toggleWishlist() {
  if (!currentUser) {
    showToast('Silakan login untuk menggunakan wishlist.');
    return;
  }
  document.getElementById('wishlistOverlay').classList.toggle('open');
  if (document.getElementById('wishlistOverlay').classList.contains('open')) {
    renderWishlistItems();
  }
}

function closeWishlist() {
  document.getElementById('wishlistOverlay').classList.remove('open');
}

async function renderWishlistItems() {
  const container = document.getElementById('wishlistItems');
  
  if (!currentUser) {
    container.innerHTML = `
      <div class="wishlist-login-prompt">
        <p>Anda harus login untuk melihat wishlist Anda.</p>
        <a href="/login" class="btn-login">LOGIN</a>
      </div>
    `;
    return;
  }
  
  if (currentWishlist.length === 0) {
    container.innerHTML = '<div class="wishlist-empty">Wishlist kosong. Mulai tambahkan produk favorit Anda!</div>';
    return;
  }
  
  const wishlistProducts = PRODUCTS.filter(p => currentWishlist.includes(p.id));
  container.innerHTML = wishlistProducts.map(p => `
    <div class="wishlist-item">
      <img src="${p.image}" alt="" class="wishlist-item-img">
      <div class="wishlist-item-info">
        <div class="wishlist-item-brand">${p.brand}</div>
        <div class="wishlist-item-name">${p.name}</div>
        <div class="wishlist-item-price">Rp ${p.price.toLocaleString('id-ID')}</div>
      </div>
      <button class="wishlist-item-remove" onclick="removeFromWishlist('${p.id}')">✕</button>
      <div class="wishlist-item-actions">
        <button class="wishlist-btn-view" onclick="openProduct('${p.id}')">LIHAT</button>
      </div>
    </div>
  `).join('');
}

// ════════════════════════════════════════════ DATA LOADING ════════════════════════════════════════════
async function loadProducts() {
  const { data, error } = await sb.from('products').select('*');
  if (error) {
    console.error('Error loading products:', error);
    return;
  }
  PRODUCTS = data || [];
}

async function loadStores() {
  const { data, error } = await sb.from('stores').select('*').eq('is_visible', true);
  if (error) {
    console.error('Error loading stores:', error);
    return;
  }
  STORES = data || [];
}

async function loadAllReviews() {
  const { data, error } = await sb.from('reviews').select('*');
  if (error) {
    console.error('Error loading reviews:', error);
    return;
  }
  
  storeComments = {};
  storeRatings = {};
  
  (data || []).forEach(review => {
    const storeId = review.store_id;
    
    if (!storeComments[storeId]) storeComments[storeId] = [];
    if (!storeRatings[storeId]) storeRatings[storeId] = { total: 0, count: 0 };
    
    storeComments[storeId].push(review);
    storeRatings[storeId].total += review.rating || 0;
    storeRatings[storeId].count += 1;
  });
}

async function loadAllData() {
  await loadProducts();
  await loadStores();
  await loadAllReviews();
  await initAuth();
  buildStores();
  buildProducts();
}

// ════════════════════════════════════════════ PRODUCT DISPLAY ════════════════════════════════════════════
function buildProducts() {
  const filtered = getFilteredProducts();
  document.getElementById('productCount').textContent = `Menampilkan ${filtered.length} produk`;
  
  const grid = document.getElementById('productsGrid');
  grid.innerHTML = filtered.map(p => `
    <div class="product-card" onclick="openProduct('${p.id}')">
      <img src="${p.image}" alt="" class="product-img">
      <button class="card-wishlist-btn" data-product-id="${p.id}" onclick="event.stopPropagation(); handleCardWishlist('${p.id}')" title="Tambah ke Wishlist">♡</button>
      <div class="product-brand">${p.brand}</div>
      <div class="product-name">${p.name}</div>
      <div class="product-price">Rp ${p.price.toLocaleString('id-ID')}</div>
      <div class="product-actions">
        <button class="btn-primary" onclick="event.stopPropagation(); addToCart()">Keranjang</button>
        <button class="btn-secondary" onclick="event.stopPropagation(); openShare()">Bagikan</button>
      </div>
    </div>
  `).join('');
  
  updateAllWishlistButtons();
}

function handleCardWishlist(productId) {
  if (!currentUser) {
    showToast('Silakan login untuk menggunakan wishlist.');
    return;
  }
  
  if (currentWishlist.includes(productId)) {
    removeFromWishlist(productId);
  } else {
    addToWishlist(productId);
  }
}

function getFilteredProducts() {
  const categories = Array.from(document.querySelectorAll('.filter-group input[type="checkbox"]'))
    .filter(cb => cb.checked && cb.parentElement.querySelector('label').textContent !== 'Semua Kategori')
    .map(cb => cb.value);
  
  const brands = Array.from(document.querySelectorAll('.filter-section:nth-child(2) input[type="checkbox"]'))
    .filter(cb => cb.checked)
    .map(cb => cb.value);
  
  const minPrice = parseInt(document.getElementById('priceMin').value) || 0;
  const maxPrice = parseInt(document.getElementById('priceMax').value) || Infinity;
  
  return PRODUCTS.filter(p => {
    const categoryMatch = !categories.length || categories.includes(p.category?.toLowerCase());
    const brandMatch = !brands.length || brands.includes(p.brand?.toLowerCase());
    const priceMatch = p.price >= minPrice && p.price <= maxPrice;
    return categoryMatch && brandMatch && priceMatch;
  });
}

function applyFilters() {
  buildProducts();
}

function setViewMode(mode) {
  viewMode = mode;
  document.querySelectorAll('.view-btn').forEach(btn => btn.classList.remove('active'));
  document.querySelector(`[data-view="${mode}"]`).classList.add('active');
  
  const grid = document.getElementById('productsGrid');
  if (mode === 'list') {
    grid.style.gridTemplateColumns = '1fr';
  } else {
    grid.style.gridTemplateColumns = 'repeat(auto-fill, minmax(200px, 1fr))';
  }
}

// ════════════════════════════════════════════ PRODUCT MODAL ════════════════════════════════════════════
function openProduct(productId) {
  const product = PRODUCTS.find(p => p.id === productId);
  if (!product) return;
  
  currentProductId = productId;
  
  document.getElementById('modalImg').src = product.image;
  document.getElementById('modalBrand').textContent = product.brand;
  document.getElementById('modalName').textContent = product.name;
  document.getElementById('modalPrice').textContent = `Rp ${product.price.toLocaleString('id-ID')}`;
  document.getElementById('modalDesc').textContent = product.description || 'Tidak ada deskripsi.';
  
  const specs = document.getElementById('modalSpecs');
  specs.innerHTML = `
    <div class="modal-spec-item"><div class="modal-spec-label">KATEGORI</div><div class="modal-spec-value">${product.category || '—'}</div></div>
    <div class="modal-spec-item"><div class="modal-spec-label">UKURAN</div><div class="modal-spec-value">${product.size || '—'}</div></div>
    <div class="modal-spec-item"><div class="modal-spec-label">WARNA</div><div class="modal-spec-value">${product.color || '—'}</div></div>
    <div class="modal-spec-item"><div class="modal-spec-label">STOK</div><div class="modal-spec-value">${product.stock > 0 ? 'Tersedia' : 'Habis'}</div></div>
  `;
  
  renderProductReviews();
  updateAllWishlistButtons();
  
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  currentProductId = null;
}

// ════════════════════════════════════════════ REVIEWS IN PRODUCT MODAL ════════════════════════════════════════════
async function renderProductReviews() {
  const product = PRODUCTS.find(p => p.id === currentProductId);
  if (!product) return;
  
  const storeId = product.store_id;
  const reviews = storeComments[storeId] || [];
  const container = document.getElementById('modalReviews');
  
  const reviewsHtml = reviews.length > 0
    ? reviews.map(r => `
        <div class="review-item">
          <div class="review-header">
            <div class="review-author">${r.author || 'Anonim'}</div>
            <div class="review-rating">${'★'.repeat(r.rating || 0)}${'☆'.repeat(5 - (r.rating || 0))}</div>
          </div>
          <div class="review-text">${r.text || '(tanpa komentar)'}</div>
          <div class="review-date">${formatDate(r.date)}</div>
        </div>
      `).join('')
    : '<div class="review-item" style="text-align:center;color:#999;">Belum ada ulasan. Jadilah yang pertama!</div>';
  
  let ratingStars = '';
  for (let i = 1; i <= 5; i++) {
    ratingStars += `<button class="star-btn" onclick="setRating(${i})" data-rating="${i}">★</button>`;
  }
  
  container.innerHTML = `
    <div class="modal-reviews-title">Ulasan & Rating</div>
    <div class="reviews-list">${reviewsHtml}</div>
    
    <div class="review-form">
      <div class="form-group">
        <label>Nama Anda (opsional)</label>
        <input type="text" id="reviewAuthor" placeholder="Nama atau alias">
      </div>
      <div class="form-group">
        <label>Rating</label>
        <div class="review-rating-input" id="ratingInput">${ratingStars}</div>
      </div>
      <div class="form-group">
        <label>Komentar (opsional)</label>
        <textarea id="reviewText" placeholder="Bagikan pengalaman Anda..."></textarea>
      </div>
      <button class="btn-submit-review" onclick="submitReview()">KIRIM ULASAN</button>
    </div>
  `;
}

let selectedRating = 0;
function setRating(rating) {
  selectedRating = rating;
  document.querySelectorAll('#ratingInput .star-btn').forEach((btn, idx) => {
    if (idx < rating) btn.classList.add('active');
    else btn.classList.remove('active');
  });
}

async function submitReview() {
  const product = PRODUCTS.find(p => p.id === currentProductId);
  if (!product) return;
  
  const author = document.getElementById('reviewAuthor').value.trim() || 'Anonim';
  const text = document.getElementById('reviewText').value.trim();
  
  if (selectedRating === 0) {
    showToast('Pilih rating terlebih dahulu.', true);
    return;
  }
  
  const { error } = await sb.from('reviews').insert({
    store_id: product.store_id,
    author,
    rating: selectedRating,
    text,
    date: new Date().toISOString().split('T')[0]
  });
  
  if (error) {
    showToast('Gagal mengirim ulasan.', true);
    return;
  }
  
  showToast('Ulasan terkirim! Terima kasih.');
  selectedRating = 0;
  document.getElementById('reviewAuthor').value = '';
  document.getElementById('reviewText').value = '';
  await loadAllReviews();
  renderProductReviews();
}

// ════════════════════════════════════════════ SHARE FUNCTIONALITY ════════════════════════════════════════════
function openShare() {
  if (!currentProductId) return;
  const product = PRODUCTS.find(p => p.id === currentProductId);
  if (!product) return;
  
  document.getElementById('shareUrl').textContent = `https://harmoniashion.com/products/${product.id}`;
  document.getElementById('shareOverlay').classList.add('open');
}

function closeShare() {
  document.getElementById('shareOverlay').classList.remove('open');
}

function copyShareUrl() {
  const url = document.getElementById('shareUrl').textContent;
  navigator.clipboard.writeText(url).then(() => showToast('Link disalin!'));
}

function shareVia(platform) {
  const url = document.getElementById('shareUrl').textContent;
  const product = PRODUCTS.find(p => p.id === currentProductId);
  const text = `Cek koleksi terbaru dari HarmoniFashion: ${product?.name}`;
  
  let shareUrl = '';
  switch(platform) {
    case 'whatsapp':
      shareUrl = `https://wa.me/?text=${encodeURIComponent(text + ' ' + url)}`;
      break;
    case 'facebook':
      shareUrl = `https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(url)}`;
      break;
    case 'instagram':
      showToast('Buka Instagram dan bagikan tangkapan layar ke stories!');
      return;
    case 'twitter':
      shareUrl = `https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(url)}`;
      break;
  }
  
  if (shareUrl) window.open(shareUrl, '_blank', 'width=600,height=600');
}

// ════════════════════════════════════════════ SEARCH ════════════════════════════════════════════
document.getElementById('searchInput')?.addEventListener('input', (e) => {
  const query = e.target.value.toLowerCase();
  const dropdown = document.getElementById('searchDropdown');
  
  if (!query) {
    dropdown.classList.remove('open');
    return;
  }
  
  const results = PRODUCTS.filter(p => 
    p.name.toLowerCase().includes(query) || 
    p.brand.toLowerCase().includes(query)
  ).slice(0, 8);
  
  dropdown.innerHTML = results.length
    ? results.map(p => `
        <div class="search-result-item" onclick="openProduct('${p.id}'); document.getElementById('searchDropdown').classList.remove('open');">
          <img src="${p.image}" alt="" class="search-result-img">
          <div class="search-result-info">
            <div class="search-result-brand">${p.brand}</div>
            <div class="search-result-name">${p.name}</div>
            <div class="search-result-price">Rp ${p.price.toLocaleString('id-ID')}</div>
          </div>
        </div>
      `).join('')
    : '<div class="search-no-result">Produk tidak ditemukan</div>';
  
  dropdown.classList.add('open');
});

// ════════════════════════════════════════════ UTILITIES ════════════════════════════════════════════
function escHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function formatDate(dateStr) {
  const date = new Date(dateStr);
  return date.toLocaleDateString('id-ID', { year: 'numeric', month: 'long', day: 'numeric' });
}

function showToast(message, isError = false) {
  const toast = document.createElement('div');
  toast.className = 'toast' + (isError ? ' error' : '');
  toast.textContent = message;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 3000);
}

function addToCart() {
  if (!currentProductId) return;
  showToast('Produk ditambahkan ke keranjang!');
  closeModal();
}
